<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jersey Mark — Front (QR side, Print)</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ---- Print page setup: 3.61in x 2.11in (3.5x2 trim + 1/16" bleed all around) ---- */
@page {
  size: 3.61in 2.11in;
  margin: 0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 3.61in;
  height: 2.11in;
  margin: 0;
  padding: 0;
  font-family: 'Crimson Text', 'DejaVu Serif', serif;
  color: #2c1a08;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

/* ---- Full-bleed card ---- */
.card {
  width: 3.61in;
  height: 2.11in;
  background: #dcc089;
  position: relative;
  overflow: hidden;
}

.parchment-lines {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 0.067in,
    rgba(101, 67, 33, 0.05) 0.07in
  );
  pointer-events: none;
}

/* Decorative borders — sit safely inside the trim line */
.border-outer {
  position: absolute;
  top: 0.095in; right: 0.095in; bottom: 0.095in; left: 0.095in;
  border: 0.025in solid #5a3510;
  border-radius: 0.04in;
  pointer-events: none;
}
.border-inner {
  position: absolute;
  top: 0.14in; right: 0.14in; bottom: 0.14in; left: 0.14in;
  border: 0.012in solid #7a4e20;
  border-radius: 0.02in;
  pointer-events: none;
}

/* Corner fleurons */
.corner {
  position: absolute;
  font-family: 'Cinzel', 'DejaVu Serif', serif;
  font-size: 0.12in;
  color: #7a4e20;
  line-height: 1;
}
.c-tl { top: 0.16in;    left: 0.17in;   }
.c-tr { top: 0.16in;    right: 0.17in;  }
.c-bl { bottom: 0.16in; left: 0.17in;   }
.c-br { bottom: 0.16in; right: 0.17in;  }

/* ---- Content layout: two columns, identity left + QR right ---- */
.content {
  position: absolute;
  top: 0.26in;
  right: 0.28in;
  bottom: 0.34in;    /* leave space for the bottom rule */
  left: 0.28in;
  display: flex;
  gap: 0.14in;
  align-items: center;
}

.left-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  min-width: 0;
}

.seal-logo {
  width: 0.55in;
  height: 0.55in;
  display: block;
  margin-bottom: 0.05in;
}
.seal-logo svg {
  width: 100%;
  height: 100%;
  display: block;
}

.card-name {
  font-family: 'Cinzel', 'DejaVu Serif', serif;
  font-size: 0.15in;
  font-weight: 700;
  color: #2c1a08;
  line-height: 1.1;
  letter-spacing: 0.04em;
  margin-bottom: 0.01in;
}

.card-aka {
  font-family: 'IM Fell English', 'DejaVu Serif', serif;
  font-style: italic;
  font-size: 0.110in;
  color: #5a3510;
  line-height: 1.1;
  margin-bottom: 0.060in;
}

.card-role {
  font-family: 'Cinzel', 'DejaVu Serif', serif;
  font-size: 0.078in;
  letter-spacing: 0.14em;
  color: #7a4e20;
  text-transform: uppercase;
  border-top: 0.007in solid rgba(90, 53, 16, 0.5);
  border-bottom: 0.007in solid rgba(90, 53, 16, 0.5);
  padding: 0.025in 0.05in;
  text-align: center;
}

/* ---- QR area — larger now that it owns the side ---- */
.right-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.05in;
  flex-shrink: 0;
  width: 1.10in;
}

.qr-frame {
  border: 0.015in solid #7a4e20;
  padding: 0.035in;
  background: #f7ecd2;
  border-radius: 0.02in;
}

#qr {
  display: block;
  width: 0.95in;
  height: 0.95in;
  image-rendering: pixelated;
}

.qr-caption {
  font-family: 'IM Fell English', 'DejaVu Serif', serif;
  font-style: italic;
  font-size: 0.095in;
  color: #7a4e20;
  text-align: center;
  line-height: 1.2;
}

/* ---- Bottom rule ---- */
.bottom-rule {
  position: absolute;
  bottom: 0.19in;
  left: 0.30in;
  right: 0.30in;
  display: flex;
  align-items: center;
  gap: 0.04in;
  color: #7a4e20;
  font-family: 'Cinzel', 'DejaVu Serif', serif;
  font-size: 0.070in;
  letter-spacing: 0.1em;
  justify-content: center;
}
.bottom-rule::before,
.bottom-rule::after {
  content: '';
  flex: 1;
  height: 0.006in;
  background: #7a4e20;
}

/* Compass watermark behind content */
.compass-bg {
  position: absolute;
  width: 1.55in;
  height: 1.55in;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #2c1a08;
  opacity: 0.085;
  pointer-events: none;
  z-index: 0;
}
/* Lift real content above the watermark without overriding existing positioning */
.content { z-index: 1; }
.left-col,
.right-col,
.quote-block,
.back-details { position: relative; z-index: 1; }
</style>
</head>
<body>
<div class="card">
    <svg class="compass-bg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor">
          <circle cx="100" cy="100" r="96" stroke-width="1.2" fill="none"/>

            <polygon points="100,100 114,72 100,28 86,72" transform="rotate(135 100 100)"/>

          <polygon points="100,100 112,122 100,190 88,122" stroke-width="0.9" fill="currentColor" fill-opacity="0.18"/>
          <polygon points="100,100 78,112 10,100 78,88" stroke-width="0.9" fill="currentColor" fill-opacity="0.18"/>
          <g transform="translate(100,10)" stroke-width="0.8" fill="currentColor" fill-opacity="0.4">
            <path d="M -7 4 L 7 4" stroke-width="0.8"/>
            <path d="M 0 -10 C -3 -6, -3 0, 0 4 C 3 0, 3 -6, 0 -10 Z"/>
            <path d="M -2 0 C -7 -2, -9 0, -9 4 C -7 2, -5 2, -3 3 Z"/>
            <path d="M 2 0 C 7 -2, 9 0, 9 4 C 7 2, 5 2, 3 3 Z"/>
          </g>
          <g font-family="Cinzel, serif" font-size="9" font-weight="700" text-anchor="middle" fill="currentColor" stroke="none">
            <text x="100" y="-2" dy="22">N</text>

  </svg>
  <div class="parchment-lines"></div>
  <div class="border-outer"></div>
  <div class="border-inner"></div>
  <div class="corner c-tl">✦</div>
  <div class="corner c-tr">✦</div>
  <div class="corner c-bl">✦</div>
  <div class="corner c-br">✦</div>

  <div class="content">
    <div class="left-col">
      <div class="seal-logo">__LOGO_SVG__</div>
      <div class="card-name">Mark Fugel</div>
      <div class="card-aka">— known as Jersey Mark —</div>
      <div class="card-role">Nomad · Chronicler · Adventurer</div>
    </div>
    <div class="right-col">
      <div class="qr-frame">
        <img id="qr" src="__QR_DATA_URI__" alt="QR code — JourneysWithJerseyMark.com" />
      </div>
      <div class="qr-caption">Scan for<br>Web Page</div>
    </div>
  </div>

  <div class="bottom-rule">✦ On the Road Since MMXXI ✦</div>
</div>
</body>
</html>
